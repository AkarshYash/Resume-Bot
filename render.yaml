services:
  - type: web
    name: resume-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_B64
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: RESUME_DRIVE_FOLDER
        sync: false
